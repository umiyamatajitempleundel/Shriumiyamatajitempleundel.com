<!DOCTYPE html>
<html>
<head>
  <title>Login - Umiya Temple</title>
  <style>
    body { font-family: Arial; text-align: center; background:#fff5e6; }
    input { padding:10px; margin:10px; width:200px; }
    button { padding:10px 20px; background:#b30000; color:white; border:none; }
  </style>
</head>

<body>

<h2>🙏 Login</h2>

<input type="text" id="loginUser" placeholder="Username"><br>
<input type="password" id="loginPass" placeholder="Password"><br>

<button onclick="login()">Login</button>

<p>New user? <a href="register.html">Register</a></p>

<script>
function login() {
  let user = document.getElementById("loginUser").value;
  let pass = document.getElementById("loginPass").value;

  let savedUser = localStorage.getItem("username");
  let savedPass = localStorage.getItem("password");

  if(user === savedUser && pass === savedPass) {
    alert("Login Successful ✅");
    window.location.href = "index.html";
  } else {
    alert("Wrong Username or Password ❌");
  }
}
</script>

</body>
</html>
